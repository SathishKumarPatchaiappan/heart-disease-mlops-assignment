name: MLOps CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-test-train-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint source code
        run: ruff check .

      - name: Run unit tests
        run: pytest

      - name: Train model smoke test
        run: python -m src.train --quick --no-mlflow

      - name: Upload trained model and evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: heart-disease-model-artifacts
          path: |
            models/heart_disease_pipeline.joblib
            models/heart_disease_pipeline.metadata.json
            reports/model_results.csv
            reports/figures/*.png

      - name: Build Docker image
        run: docker build -t heart-disease-api:${{ github.sha }} .
